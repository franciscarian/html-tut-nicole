<!DOCTYPE html>
<html>
    <head>
        <style>
            body {
                background-color: #ffffff;
                color: #000000;
            }
            p {
                font-family: 'Arial';
                font-weight: bold;
                text-align: center;

            }

            #Yellow {
                color: gold
            }
            #tiny {
                font-size: 3rem
            }
            #big {
                font-size: 7em
            }

            #price {
                font-size:1em
            }

            button {
                font-family: 'Arial';
                font-size: 15px;
                text-align: center;
                border: 2px solid lightskyblue;
                border-radius: 25px;
                background-color: lightskyblue;
                padding: 15px;
            }

            .Buy {
                text-align: center
            }
            
            #buy {
                text-emphasis-color: white;
            }

        </style>
    </head>
    <body>
        <p class="Notifier" id="Yellow">
            New
        <p>
        <p class="Text" id="tiny">
            MacBook Pro
        </p>
        <p class="Text" id="big">
            Supercharged for Pros.
        </p>
        <p class="Text" id="price">
            From $ 1999
        </p>
        <div class="Buy" id="buy">
            <button>
                Buy
            </button>
        </div>
    </body>
</html>
